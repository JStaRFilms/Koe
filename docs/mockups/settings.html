<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koe Mobile - Settings Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=IBM+Plex+Mono:wght@400;700&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#050505',
                        bone: '#E2DFD2',
                        amber: '#FFB000',
                        muted: '#888888',
                        zinc: '#1F1F1F',
                        crimson: '#8A0303',
                    },
                    fontFamily: {
                        deco: ['Righteous', 'cursive'],
                        mono: ['IBM Plex Mono', 'monospace'],
                        jp: ['Noto Serif JP', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #E2DFD2;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.15;
            z-index: 100;
        }
        .input-brutal {
            background: rgba(0,0,0,0.5);
            border: 1px solid #1F1F1F;
            color: #FFB000;
            padding: 12px 16px;
            font-family: 'IBM Plex Mono', monospace;
            width: 100%;
            outline: none;
        }
        .toggle-active {
            background: #FFB000;
            color: #050505;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div class="scanline"></div>
    
    <!-- Giant Kanji Background -->
    <div class="fixed inset-0 flex items-center justify-center pointer-events-none opacity-5">
        <span class="font-jp text-[120vw]">声</span>
    </div>

    <!-- Header -->
    <header class="p-6 border-b border-zinc relative z-10 flex justify-between items-center bg-void/50 backdrop-blur-sm">
        <div class="flex items-center gap-2">
            <span class="font-deco text-3xl text-amber">CONFIG</span>
            <span class="font-jp text-xl opacity-30">設定</span>
        </div>
        <div class="text-[10px] text-zinc font-bold space-y-1 text-right">
            <div>AES-256=ENABLED</div>
        </div>
    </header>

    <!-- Settings Content -->
    <main class="flex-grow p-6 relative z-10 space-y-10 overflow-y-auto pb-32">
        
        <!-- API Section -->
        <section class="space-y-4">
            <h3 class="text-xs text-amber font-bold flex items-center gap-2">
                <span class="w-2 h-2 bg-amber inline-block"></span>
                API_GATEWAY
            </h3>
            <div class="space-y-2">
                <label class="text-[10px] text-muted">PROVIDER_KEY (GROQ)</label>
                <div class="relative">
                    <input type="password" value="****************************************" class="input-brutal text-sm" readonly>
                    <button class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-amber">[EDIT]</button>
                </div>
                <p class="text-[9px] text-zinc leading-relaxed">keys are stored in device secure enclave. get your key at console.groq.com</p>
            </div>
        </section>

        <!-- Pipeline Section -->
        <section class="space-y-4">
            <h3 class="text-xs text-amber font-bold flex items-center gap-2">
                <span class="w-2 h-2 bg-amber inline-block"></span>
                PIPELINE_PREFERENCES
            </h3>
            
            <div class="space-y-6">
                <!-- Toggle 1 -->
                <div class="flex justify-between items-center py-2 border-b border-zinc/20">
                    <div class="space-y-0.5">
                        <p class="text-[12px] font-bold">AI_ENHANCEMENT</p>
                        <p class="text-[9px] text-muted tracking-widest lowercase">cleanup filler words & punctuation</p>
                    </div>
                    <div class="flex border border-zinc p-0.5 h-8">
                        <button class="px-3 text-[10px] font-bold text-zinc">OFF</button>
                        <button class="px-3 text-[10px] font-bold toggle-active">ON</button>
                    </div>
                </div>

                <!-- Toggle 2 -->
                <div class="flex justify-between items-center py-2 border-b border-zinc/20">
                    <div class="space-y-0.5">
                        <p class="text-[12px] font-bold">AUTO_COPY</p>
                        <p class="text-[9px] text-muted tracking-widest lowercase">clipboard sync on completion</p>
                    </div>
                    <div class="flex border border-zinc p-0.5 h-8">
                        <button class="px-3 text-[10px] font-bold text-zinc">OFF</button>
                        <button class="px-3 text-[10px] font-bold toggle-active">ON</button>
                    </div>
                </div>

                <!-- Select -->
                <div class="flex justify-between items-center py-2 border-b border-zinc/20">
                    <div class="space-y-0.5">
                        <p class="text-[12px] font-bold">TRANSCRIPTION_LANG</p>
                        <p class="text-[9px] text-muted tracking-widest lowercase">whisper model hint</p>
                    </div>
                    <button class="text-[10px] font-bold text-amber border border-amber/30 px-3 py-1">ENGLISH ▼</button>
                </div>
            </div>
        </section>

        <!-- System Section -->
        <section class="space-y-4 pt-4">
            <div class="flex flex-col gap-4">
                <button class="border border-zinc p-3 text-left text-xs text-bone hover:bg-zinc hover:text-void flex justify-between font-bold">
                    <span>DOCUMENTATION_REPO</span>
                    <span>-></span>
                </button>
                <button class="border border-zinc p-3 text-left text-xs text-bone hover:bg-zinc hover:text-void flex justify-between font-bold">
                    <span>SYSTEM_DIAGNOSTICS</span>
                    <span>-></span>
                </button>
                <button class="border border-crimson/50 text-crimson p-3 text-left text-[10px] font-bold tracking-widest text-center mt-4">
                    FACTORY_RESET_ALL_DATA
                </button>
            </div>
        </section>

    </main>

    <!-- Tab Bar -->
    <footer class="border-t border-zinc p-4 flex justify-around items-center bg-zinc/10 relative z-20">
        <div class="flex flex-col items-center text-zinc text-[10px] font-bold">
            <div class="w-1.5 h-1.5 bg-zinc mb-1 opacity-0"></div>
            RECORDER
        </div>
        <div class="flex flex-col items-center text-zinc text-[10px] font-bold">
            <div class="w-1.5 h-1.5 bg-zinc mb-1 opacity-0"></div>
            HISTORY
        </div>
        <div class="flex flex-col items-center text-amber text-[10px] font-bold">
            <div class="w-1.5 h-1.5 bg-amber mb-1"></div>
            SETTINGS
        </div>
    </footer>
</body>
</html>
