appId: com.jstarfilmsstudios.koe
productName: Koe
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
copyright: "Copyright © 2026 J StaR Films Studios"
directories:
  output: release
publish:
  provider: github
  owner: JStaRFilms
  repo: Koe
files:
  - dist/renderer/**/*
  - src/main/**/*
  - src/shared/**/*
  - src/assets/**/*
  - package.json
asarUnpack:
  - "dist/renderer/assets/vad/**/*"
win:
  target: nsis
  icon: src/assets/icons/logo.png
  legalTrademarks: "J StaR Films Studios"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
