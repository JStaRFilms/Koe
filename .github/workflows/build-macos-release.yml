name: Build macOS Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to attach macOS artifacts to
        required: true
        default: v1.0.4

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS artifacts
        run: pnpm build:mac

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: koe-macos-${{ github.run_number }}
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac*.yml
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        shell: bash
        run: |
          shopt -s nullglob
          files=(release/*.dmg release/*.zip release/latest-mac*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No macOS artifacts found in release/."
            exit 1
          fi
          gh release upload "${{ inputs.release_tag }}" "${files[@]}" --clobber
