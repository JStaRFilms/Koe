<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            position: relative;
            overflow: hidden;
        }

        .grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(39, 39, 39, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(39, 39, 39, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .content {
            text-align: center;
            z-index: 1;
        }

        .logo {
            font-size: 120px;
            font-weight: bold;
            color: #f59e0b;
            letter-spacing: -4px;
            margin-bottom: 20px;
            text-shadow: 0 0 60px rgba(245, 158, 11, 0.5);
        }

        .tagline {
            font-size: 36px;
            color: #e8e4dc;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .badge {
            display: inline-block;
            padding: 12px 32px;
            border: 2px solid #f59e0b;
            color: #f59e0b;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #272727;
        }

        .corner.tl {
            top: 30px;
            left: 30px;
            border-right: none;
            border-bottom: none;
        }

        .corner.tr {
            top: 30px;
            right: 30px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bl {
            bottom: 30px;
            left: 30px;
            border-right: none;
            border-top: none;
        }

        .corner.br {
            bottom: 30px;
            right: 30px;
            border-left: none;
            border-top: none;
        }
    </style>
</head>

<body>
    <div class="grid"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="content">
        <div class="logo">Koe</div>
        <div class="tagline">Free Voice Dictation for Desktop and Mobile</div>
        <div class="badge">Open Source</div>
    </div>
</body>

</html>
